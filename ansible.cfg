# =============================================================================
# Ansible Configuration for Wazuh 4.11.2 Deployment
# Target OS: Ubuntu 24.04 / RHEL
# =============================================================================

[defaults]
# Path to the inventory file
inventory = inventory/hosts.yml

# Path to search for roles
roles_path = roles

# Default remote user for SSH connections
remote_user = ansible

# Enable privilege escalation by default
become = true

# Method used for privilege escalation
become_method = sudo

# Disable SSH host key checking (useful for dynamic environments)
host_key_checking = False

# Number of parallel processes to use when communicating with remote hosts
forks = 10

# Disable .retry files on playbook failure
retry_files_enabled = False

# Use YAML callback plugin for human-readable output
stdout_callback = yaml

# SSH connection timeout in seconds
timeout = 30

# Smart gathering: only gather facts when they are not already cached
gathering = smart

# Cache facts to JSON files for performance improvement
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts_cache
fact_caching_timeout = 3600

[privilege_escalation]
become = true
become_method = sudo
become_ask_pass = false

[ssh_connection]
# Use SSH pipelining for improved performance
pipelining = true

# SSH arguments for persistent connections
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
