global
    log /dev/log local0
    daemon

defaults
    log global
    mode tcp
    timeout connect 5s
    timeout client  1m
    timeout server  1m

frontend wazuh_front
    bind *:1514
    mode tcp
    default_backend wazuh_back

backend wazuh_back
    mode tcp
    balance leastconn
    option tcp-check

    server mgr1 172.21.1.85:1514 check
    server mgr2 172.21.1.86:1514 check
    server mgr3 172.21.5.85:1514 check
    server mgr4 172.21.5.86:1514 check
