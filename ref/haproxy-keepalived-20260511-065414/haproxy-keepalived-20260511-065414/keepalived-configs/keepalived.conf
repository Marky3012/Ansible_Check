vrrp_script chk_haproxy {
    script "/etc/keepalived/check_haproxy.sh"
    interval 2
    fall 2
    rise 1
}

vrrp_instance VI_DC {
    state MASTER
    interface enp1s0
    virtual_router_id 51
    priority 150
    advert_int 1

    authentication {
        auth_type PASS
        auth_pass 1234
    }

    virtual_ipaddress {
        172.21.1.120
    }

    track_script {
        chk_haproxy
    }
}
