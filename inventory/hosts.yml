---
# =============================================================================
# Wazuh 4.11.2 Inventory File
# Target OS: Ubuntu 24.04 / RHEL
#
# Instructions:
#   - Replace placeholder IPs (e.g., 10.0.1.x) with actual host IPs.
#   - Ensure the 'ansible' user has SSH access and sudo privileges on all hosts.
#   - For multi-node clusters, add additional hosts under each group.
# =============================================================================

all:
  children:
    # -------------------------------------------------------------------------
    # Wazuh Manager Nodes
    # Responsible for: event analysis, rule matching, agent management, API
    # -------------------------------------------------------------------------
    wazuh_manager:
      hosts:
        wazuh-manager-01:
          ansible_host: 10.0.1.10        # Replace with actual manager IP
          # ansible_port: 22              # Uncomment to override default SSH port
          # wazuh_manager_node_type: master  # Overridable per-host if needed
        # wazuh-manager-02:              # Uncomment for multi-node cluster
        #   ansible_host: 10.0.1.11
        #   wazuh_manager_node_type: worker
      vars:
        ansible_user: ansible
        ansible_become: true
        ansible_become_method: sudo
        ansible_python_interpreter: /usr/bin/python3

    # -------------------------------------------------------------------------
    # Wazuh Indexer Nodes (OpenSearch-based)
    # Responsible for: storing, indexing, and searching alert data
    # -------------------------------------------------------------------------
    wazuh_indexer:
      hosts:
        wazuh-indexer-01:
          ansible_host: 10.0.1.20        # Replace with actual indexer IP
          # wazuh_indexer_node_name: indexer-node-01  # Per-host override
        # wazuh-indexer-02:              # Uncomment for multi-node indexer cluster
        #   ansible_host: 10.0.1.21
        #   wazuh_indexer_node_name: indexer-node-02
        # wazuh-indexer-03:
        #   ansible_host: 10.0.1.22
        #   wazuh_indexer_node_name: indexer-node-03
      vars:
        ansible_user: ansible
        ansible_become: true
        ansible_become_method: sudo
        ansible_python_interpreter: /usr/bin/python3

    # -------------------------------------------------------------------------
    # Wazuh Agent Nodes
    # Responsible for: endpoint monitoring, log collection, FIM, SCA
    # -------------------------------------------------------------------------
    wazuh_agents:
      hosts:
        wazuh-agent-01:
          ansible_host: 10.0.1.30        # Replace with actual agent IP
          # wazuh_agent_name: agent-01    # Optional custom agent name
        wazuh-agent-02:
          ansible_host: 10.0.1.31        # Replace with actual agent IP
          # wazuh_agent_name: agent-02
        # wazuh-agent-03:               # Add more agents as needed
        #   ansible_host: 10.0.1.32
      vars:
        ansible_user: ansible
        ansible_become: true
        ansible_become_method: sudo
        ansible_python_interpreter: /usr/bin/python3
