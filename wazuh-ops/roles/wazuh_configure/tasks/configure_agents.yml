---
# Push ossec.conf to agent nodes — opt-in (configure_agents: false by default)
# Tags: configure, configure_agents

- name: Backup existing agent ossec.conf
  ansible.builtin.copy:
    src: "{{ wazuh_config_dir }}/ossec.conf"
    dest: "{{ wazuh_config_dir }}/ossec.conf.bkp_{{ ansible_date_time.iso8601_basic_short }}"
    remote_src: true
    mode: "0640"
  when: config_backup | bool
  failed_when: false
  tags: [configure, configure_agents]

- name: Deploy agent ossec.conf from template
  ansible.builtin.template:
    src: ossec_agent.conf.j2
    dest: "{{ wazuh_config_dir }}/ossec.conf"
    owner: root
    group: ossec
    mode: "0640"
  notify: restart agent
  tags: [configure, configure_agents]
