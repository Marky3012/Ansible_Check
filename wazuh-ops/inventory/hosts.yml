---
# wazuh-ops inventory
# Cluster size is determined entirely by the entries below.
# Add or remove hosts here — no other file needs to change for scaling.

all:
  vars:
    ansible_user: ansible
    ansible_become: true
    ansible_python_interpreter: /usr/bin/python3

haproxy_nodes:
  hosts:
    haproxy-master:
      ansible_host: 172.21.1.93
      keepalived_node_state: MASTER
      keepalived_node_priority: 150
    haproxy-backup:
      ansible_host: 172.21.1.94
      keepalived_node_state: BACKUP
      keepalived_node_priority: 140
  # To add a third HA node:
  #   haproxy-node3:
  #     ansible_host: x.x.x.x
  #     keepalived_node_state: BACKUP
  #     keepalived_node_priority: 130

wazuh_managers:
  hosts:
    wazuh-mgr1:
      ansible_host: 172.21.1.85
      wazuh_cluster_node_type: master   # designated Wazuh cluster master
    wazuh-mgr2:
      ansible_host: 172.21.1.86
    wazuh-mgr3:
      ansible_host: 172.21.5.85
    wazuh-mgr4:
      ansible_host: 172.21.5.86
  # Add or remove manager hosts here — haproxy.cfg.j2 builds its backend
  # server list from this group automatically.
  # For manager failover, specify at runtime:
  #   -e "manager_original_master=wazuh-mgr1 manager_promote_candidate=wazuh-mgr2"

wazuh_indexers:
  hosts: {}
  # IMPORTANT: Use 1 node (standalone) or 3+ nodes (quorum-safe).
  # 2 nodes is REJECTED at preflight — guaranteed split-brain.
  # Populate when indexer nodes are provisioned:
  # wazuh-indexer1:
  #   ansible_host: x.x.x.x
  # wazuh-indexer2:
  #   ansible_host: x.x.x.x
  # wazuh-indexer3:
  #   ansible_host: x.x.x.x

postgres_nodes:
  hosts: {}
  # Populate when postgres nodes are provisioned:
  # postgres-primary:
  #   ansible_host: x.x.x.x
  #   postgres_node_id: 1
  # postgres-standby1:
  #   ansible_host: x.x.x.x
  #   postgres_node_id: 2
  # For postgres failover, specify at runtime:
  #   -e "postgres_primary_host=postgres-primary postgres_standby_host=postgres-standby1"

wazuh_agents:
  hosts: {}
  # Populated at enrollment time via agent_ops.yml
