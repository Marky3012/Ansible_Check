    and optionally sets up firewall rules.
  license: MIT
  min_ansible_version: '2.14'
  platforms:
    - name: Ubuntu
      versions:
        - noble   # 24.04
    - name: EL
      versions:
        - '8'
        - '9'
  galaxy_tags:
    - wazuh
    - security
    - siem

dependencies: []
